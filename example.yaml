# Example named gws workspace.
# Copy this file to:
#   ~/.config/ghostty-workspace/workspaces/example.yaml
# Then validate and launch it with:
#   gws validate example
#   gws start example
#
# Change `name`, titles, paths, and commands for your own workspace.

version: 2
name: example

window:
  # new creates an isolated Ghostty window; front reuses the front window.
  target: new
  tab_position: append
  reuse_existing_tabs: false

tabs:
  - key: code
    title: "example · Code"
    working_dir: ~/projects/example
    command: nvim
    focus: true
    split:
      direction: right
      ratio: "70/30"
      second_pane_command: git status --short
      second_pane_working_dir: ~/projects/example

  - key: server
    title: "example · Server"
    working_dir: ~/projects/example
    command: npm run dev

  - key: terminal
    title: "example · Terminal"
    working_dir: ~/projects/example
    command: ""
    reuse_if_exists: true

  # Keep optional tabs in the file without launching them.
  - key: database
    title: "example · Database"
    working_dir: ~/projects/example
    command: psql example_dev
    enabled: false
